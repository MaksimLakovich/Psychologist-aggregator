<div id="psychologist-specialisations-modal"
     data-modal
     class="fixed inset-0 z-[90] hidden bg-indigo-950/45 px-4 py-6 backdrop-blur-sm sm:px-6">
    <div class="mx-auto flex min-h-full max-w-4xl items-center justify-center">
        <div class="flex max-h-[90vh] w-full flex-col overflow-hidden rounded-[2rem] border border-indigo-100/80 bg-[linear-gradient(180deg,rgba(255,255,255,0.98),rgba(248,250,255,0.95))] shadow-[0_30px_80px_rgba(15,23,42,0.22)]">
            <div class="shrink-0 border-b border-indigo-100 px-6 py-5 sm:px-8">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <h2 class="mt-3 text-2xl font-black tracking-tight text-indigo-950/75">Специализации</h2>
                        <p class="mt-3 text-xs font-bold uppercase tracking-[0.2em] text-indigo-950/75">Выберите направления и школы, которые лучше всего описывают вашу практику</p>
                    </div>
                    <button type="button"
                            data-modal-close
                            class="rounded-full p-2 text-zinc-400 transition-colors hover:bg-zinc-100 hover:text-zinc-700">
                        <span class="sr-only">Закрыть</span>
                        <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M4.22 4.22a.75.75 0 011.06 0L10 8.94l4.72-4.72a.75.75 0 111.06 1.06L11.06 10l4.72 4.72a.75.75 0 11-1.06 1.06L10 11.06l-4.72 4.72a.75.75 0 11-1.06-1.06L8.94 10 4.22 5.28a.75.75 0 010-1.06z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>

            <div class="min-h-0 flex-1 overflow-y-auto px-6 py-6 sm:px-8">
                <div id="psychologist-specialisations-modal-error" class="mb-5 hidden rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-medium text-rose-700"></div>

                <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                    {% for specialisation in all_specialisations %}
                        <label class="psychologist-modal-choice{% if specialisation.pk|stringformat:"s" in selected_specialisations %} is-selected{% endif %} block rounded-2xl">
                            <input id="account-specialisation-{{ specialisation.pk }}"
                                   type="checkbox"
                                   name="specialisations"
                                   form="psychologist-profile-form"
                                   value="{{ specialisation.pk }}"
                                   data-label="{{ specialisation.name }}"
                                   class="psychologist-specialisation-checkbox"
                                   {% if specialisation.pk|stringformat:"s" in selected_specialisations %}checked{% endif %}>
                            <span class="psychologist-modal-choice__card">
                                <span class="psychologist-modal-choice__indicator psychologist-modal-choice__indicator--specialisation" aria-hidden="true"></span>
                                <span class="psychologist-modal-choice__label">
                                    {{ specialisation.name }}
                                </span>
                            </span>
                        </label>
                    {% empty %}
                        <p class="text-sm text-zinc-500">Специализации не найдены.</p>
                    {% endfor %}
                </div>
            </div>

            <div class="shrink-0 border-t border-indigo-100 px-6 py-5 sm:px-8">
                <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
                    <button type="button"
                            data-modal-close
                            class="inline-flex items-center justify-center rounded-2xl border border-zinc-200 px-5 py-3 text-sm font-semibold text-zinc-700 transition hover:bg-zinc-50">
                        Отмена
                    </button>
                    <button type="button"
                            id="save-psychologist-specialisations-button"
                            class="inline-flex items-center justify-center rounded-2xl bg-fuchsia-600 px-5 py-3 text-sm font-semibold text-white transition hover:bg-fuchsia-700">
                        Сохранить
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
