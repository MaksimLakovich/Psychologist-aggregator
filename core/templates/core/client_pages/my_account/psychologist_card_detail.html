{% extends 'core/base.html' %}
{% load static %}

{% block title %}{{ title_psychologist_catalog_detail_page_view|default:"ОПОРА" }}{% endblock %}

{% block extra_style %}
<style>
    body {
        background-image: url('{% static "images/background/background-start.jpg" %}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    /* Анимации появления */
    @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .animate-detail {
        animation: slideUpFade 0.8s ease-out forwards;
    }

    /* Липкий сайдбар (Companion) */
    .sticky-companion {
        position: sticky;
        top: 2rem;
    }

    /* Стили для клона хедера в сайдбаре (скрыт по умолчанию) */
    #ps-main-header-clone {
        transition: opacity 0.3s ease, transform 0.3s ease;
    }

    /* Кастомный скроллбар для модалок */
    .modal-scroll::-webkit-scrollbar { width: 4px; }
    .modal-scroll::-webkit-scrollbar-track { background: transparent; }
    .modal-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
</style>
{% endblock %}

{% block content %}

{% endblock %}
