{% load static %}

<!-- БЛОК 4: Управление встречей / история отмены или переноса -->

{% if can_manage_session_actions %}

    <article class="rounded-[2rem] bg-slate-100/50 p-6 sm:p-8 shadow-lg shadow-slate-100 backdrop-blur-md animate-fade-in-up delay-200">
        <div class="flex flex-col gap-6">
            <div>
                <h2 class="text-2xl font-extrabold text-indigo-950 mb-2">
                    Управление встречей
                </h2>
            </div>

            <div class="flex flex-col gap-4 sm:flex-row sm:flex-wrap">
                <button
                    type="button"
                    data-open-reschedule-modal
                    class="cta-shine-button group w-full sm:w-auto inline-flex items-center justify-center px-7 py-3 gap-3 rounded-xl bg-sky-600/85
                    text-white font-semibold transition-all duration-200 hover:bg-sky-600 border border-transparent"
                >
                    <span class="cta-shine-button__glint"></span>
                    <img src="{% static 'images/booking/reschedule-event-white.svg' %}" alt="reschedule" class="relative z-10 w-6 h-6 transition-transform duration-300 group-hover:-rotate-12">
                    <span class="relative z-10">Перенести встречу</span>
                </button>

                <button
                    type="button"
                    data-open-cancel-modal
                    class="cta-shine-button group w-full sm:w-auto inline-flex items-center justify-center px-7 py-3 gap-3 rounded-xl bg-slate-500/85
                    text-white font-semibold transition-all duration-200 hover:bg-slate-500 border border-transparent"
                >
                    <span class="cta-shine-button__glint"></span>
                    <img src="{% static 'images/booking/cancel-event-white.svg' %}" alt="cancel" class="relative z-10 w-6 h-6 transition-transform duration-300 group-hover:-rotate-12">
                    <span class="relative z-10">Отменить встречу</span>
                </button>
            </div>
        </div>
    </article>

{% elif session_change_reason_label and slot.cancel_reason %}

    <article class="rounded-[2rem] bg-slate-100/50 p-6 sm:p-8 shadow-lg shadow-slate-100 backdrop-blur-md animate-fade-in-up delay-200">
        <h2 class="text-2xl font-extrabold text-indigo-950 mb-6">
            {{ session_change_reason_label }}
        </h2>

        <div class="pl-4">
            <p class="whitespace-pre-line text-base leading-relaxed text-zinc-700">{{ slot.cancel_reason }}</p>
        </div>

        {% if rescheduled_event_url %}
            <div class="mt-6 pl-4">
                <a href="{{ rescheduled_event_url }}"
                   class="cta-shine-button group inline-flex items-center justify-center px-6 py-3 gap-3 rounded-xl bg-indigo-600/90
                   text-white font-semibold transition-all duration-200 hover:bg-indigo-700 border border-transparent w-full sm:w-auto">
                    <span class="cta-shine-button__glint"></span>
                    <img src="{% static 'images/booking/video-white.svg' %}" alt="new-event" class="relative z-10 w-5 h-5 transition-transform duration-300 group-hover:-rotate-12">
                    <span class="relative z-10">Перейти в новую встречу</span>
                </a>
            </div>
        {% endif %}
    </article>

{% endif %}
