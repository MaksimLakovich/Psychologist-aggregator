<div
    id="cancel-session-modal"
    tabindex="-1"
    class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
>
    <div class="relative w-full max-w-2xl max-h-[85vh] rounded-2xl bg-white p-6 shadow-lg flex flex-col">
        <div class="flex items-center justify-between pb-6">
            <div>
                <h3 class="text-2xl font-extrabold text-indigo-950">
                    Отмена встречи
                </h3>
            </div>
            <button
                type="button"
                class="text-gray-400 hover:text-gray-900"
                data-close-cancel-modal
            >
                ✕
            </button>
        </div>

        <form method="post" action="" class="border-t border-default space-y-5">
            {% csrf_token %}
            {{ cancel_session_form.action }}
            {{ cancel_session_form.cancel_reason_type }}

            <div class="space-y-2 pt-6">
                <div class="flex items-baseline justify-between">
                    <label for="{{ cancel_session_form.cancel_reason.id_for_label }}"
                           class="text-sm font-bold uppercase tracking-widest text-indigo-950">
                        Причина отмены
                        <span class="ml-2 text-xs font-semibold tracking-wider text-pink-300 lowercase italic">
                            (обязательно)
                        </span>
                    </label>
                </div>

                <div class="glass-input">
                    {{ cancel_session_form.cancel_reason }}
                </div>

                {% if cancel_session_form.cancel_reason.errors %}
                    <div class="text-xs text-red-500 mt-1">
                        {{ cancel_session_form.cancel_reason.errors }}
                    </div>
                {% endif %}
            </div>



            <div class="flex flex-col-reverse gap-3 pt-6 sm:flex-row sm:justify-end">
                <button
                    type="button"
                    class="rounded-xl border border-zinc-200 px-6 py-3 text-sm font-bold text-zinc-600 transition hover:bg-zinc-50"
                    data-close-cancel-modal
                >
                    Отмена
                </button>
                <button
                    type="submit"
                    id="cancel-session-submit"
                    class="rounded-xl bg-indigo-700 hover:bg-indigo-800 px-6 py-3 text-sm font-bold text-white transition
                    disabled:cursor-not-allowed disabled:bg-zinc-300"
                    disabled
                >
                    Отменить встречу
                </button>
            </div>
        </form>
    </div>
</div>
