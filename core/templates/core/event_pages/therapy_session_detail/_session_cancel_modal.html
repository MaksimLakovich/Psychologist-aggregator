<div
    id="cancel-session-modal"
    tabindex="-1"
    class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4"
>
    <div class="relative w-full max-w-2xl max-h-[85vh] rounded-2xl bg-white p-6 shadow-lg flex flex-col">
        <div class="flex items-center justify-between pb-6">
            <div>
                <h3 class="text-2xl font-extrabold text-indigo-950">
                    Отмена встречи
                </h3>
            </div>
            <button
                type="button"
                class="text-gray-400 hover:text-gray-900"
                data-close-cancel-modal
            >
                ✕
            </button>
        </div>

        <form method="post" action="" class="border-t border-default pt-3 space-y-5">
            {% csrf_token %}
            {{ cancel_session_form.action }}
            {{ cancel_session_form.cancel_reason_type }}

            <div class="rounded-2xl border border-rose-100 bg-rose-50/80 px-4 py-3">
                <p class="text-xs font-bold uppercase tracking-widest text-rose-400 mb-1">Тип причины</p>
                <p class="text-sm font-semibold text-rose-700">Отменено пользователем</p>
            </div>

            <div class="glass-input">
                <label for="id_cancel_reason" class="mb-2 block text-sm font-semibold text-indigo-950">
                    Причина отмены
                </label>
                {{ cancel_session_form.cancel_reason }}
            </div>

            <div class="flex flex-col-reverse gap-3 border-t border-default pt-6 sm:flex-row sm:justify-end">
                <button
                    type="button"
                    class="rounded-xl border border-zinc-200 px-6 py-3 text-sm font-bold text-zinc-600 transition hover:bg-zinc-50"
                    data-close-cancel-modal
                >
                    Отмена
                </button>
                <button
                    type="submit"
                    id="cancel-session-submit"
                    class="rounded-xl bg-rose-400 px-6 py-3 text-sm font-bold text-white transition hover:bg-rose-500 disabled:cursor-not-allowed disabled:bg-zinc-300"
                    disabled
                >
                    Отменить встречу
                </button>
            </div>
        </form>
    </div>
</div>
