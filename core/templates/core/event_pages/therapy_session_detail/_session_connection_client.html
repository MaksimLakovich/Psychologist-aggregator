{% load static %}

<!-- БЛОК 2: Подключение клиента к встрече -->

<!-- На клиентской странице один и тот же блок выполняет 2 разные бизнес-задачи:
     - пока встреча еще не завершена, он отвечает за подключение к звонку;
     - после завершения встречи он превращается в блок "Итоги встречи", если специалист заполнил meeting_resume.
     Если архивная встреча завершилась без meeting_resume, блок целиком скрываем, чтобы не показывать пустую секцию -->

{% if slot %}

    {% if not is_finished_slot %}
        <!-- Клиент не редактирует meeting_url: специалист готовит ссылку -->
        {% if slot.meeting_url and can_open_meeting_url %}
            <div class="space-y-4 pl-8 animate-fade-in-up delay-200">
                <a href="{{ slot.meeting_url }}" target="_blank"
                   class="cta-shine-button group w-full sm:w-auto inline-flex items-center justify-center px-7 py-3 gap-3 rounded-xl bg-violet-500/95
                   text-white font-bold transition-all duration-200 hover:bg-violet-600 border border-transparent">
                    <span class="cta-shine-button__glint"></span>
                    <img src="{% static 'images/booking/video-white.svg' %}" alt="video" class="relative z-10 w-6 h-6 transition-transform duration-300 group-hover:-rotate-12">
                    <span class="relative z-10">Перейти в видеочат</span>
                </a>
            </div>
        {% else %}
            <article class="rounded-[2rem] bg-slate-100/50 p-6 sm:p-8 shadow-lg shadow-slate-100 backdrop-blur-md animate-fade-in-up delay-200">
                <h2 class="text-2xl font-extrabold text-indigo-950 mb-6 flex items-center gap-3">
                    Подключение
                </h2>
                <div>
                    <p class="mt-2 text-zinc-500">
                        Кнопка для подключения к видеочату появится ближе к началу встречи
                    </p>
                </div>
            </article>
        {% endif %}

    {% endif %}

{% endif %}
